# 原型本身在 Maven 仓库中的坐标（安装到本地仓库后用这个找到它）
archetype.groupId=com.nedk.framework
archetype.artifactId=nedk-framework-archetype
archetype.version=1.0.0

# 生成原型时排除的文件（不打进模板）
excludePatterns=archetype.properties,nohup.out,CLAUDE.md,*.iml,.idea/,logs/,.claude/

# 新建项目时的默认值（mvn archetype:generate 时会提示用户输入，这是默认值）
groupId=com.example
artifactId=myproject
version=1.0.0-SNAPSHOT
package=com.example.myproject
