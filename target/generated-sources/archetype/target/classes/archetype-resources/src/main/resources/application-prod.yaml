#set( $symbol_dollar = '$' )
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${symbol_dollar}{DB_HOST}:${symbol_dollar}{DB_PORT:3306}/${symbol_dollar}{DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${symbol_dollar}{DB_USERNAME}
    password: ${symbol_dollar}{DB_PASSWORD}

  data:
    redis:
      host: ${symbol_dollar}{REDIS_HOST}
      port: ${symbol_dollar}{REDIS_PORT:6379}
      password: ${symbol_dollar}{REDIS_PASSWORD}
      database: ${symbol_dollar}{REDIS_DATABASE:0}
      timeout: 3000ms

  rabbitmq:
    host: ${symbol_dollar}{RABBITMQ_HOST}
    port: ${symbol_dollar}{RABBITMQ_PORT:5672}
    username: ${symbol_dollar}{RABBITMQ_USERNAME}
    password: ${symbol_dollar}{RABBITMQ_PASSWORD}
    virtual-host: ${symbol_dollar}{RABBITMQ_VHOST:/}

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境不打印 SQL，避免日志过大
